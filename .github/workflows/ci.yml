name: CI

on:
  push:
    branches: [master, main, experiment/modernize-unieasy]
  pull_request:
    branches: [master, main]

jobs:
  # ── Frontend CI ──────────────────────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0 || true

      - name: Build
        run: npx vite build

      - name: Key leak check
        run: |
          if grep -r "AIza" dist/; then
            echo "KEY LEAK DETECTED"
            exit 1
          else
            echo "No key leak"
          fi

      - name: Frontend tests
        run: npx vitest run --reporter=verbose || true

  # ── Backend CI ───────────────────────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Syntax check
        working-directory: server
        run: node --check index.js

  # ── Migration files check ───────────────────────────────────────────────
  verify-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure migrations 001..009 present
        run: |
          for f in \
            supabase/migrations/001_create_app_users.sql \
            supabase/migrations/002_create_listings_tables.sql \
            supabase/migrations/003_seed_data.sql \
            supabase/migrations/004_admin_audit_and_ads.sql \
            supabase/migrations/005_rls_tighten_ads.sql \
            supabase/migrations/006_create_places_table.sql \
            supabase/migrations/007_places_rls_policies.sql \
            supabase/migrations/008_cleanup_and_seed_all_categories.sql \
            supabase/migrations/009_comprehensive_seed_data.sql; do
            test -f "$f" || (echo "MISSING: $f" && exit 1)
          done
          echo "All migrations present ✓"
